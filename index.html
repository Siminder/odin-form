<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="container">
        <div class="leftSide">
            <img class="backgroundImg" src="./images/photo-1585202900225-6d3ac20a6962.avif" alt="leaf">
            <div class="odinTitle">
                <img class="logo" src="./images/odin-lined.png" alt="">
                <h1>ODIN</h1>
            </div>
        </div>

        <div class="rightSide">
            <h1>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams Sign up <i>now</i> to get started.</h1>
            <h1>You <i>know</i> what to do </h1>
            <p>Let's do this!</p>

            <form action="" method="post">
                <div>
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name">
                </div>

                <div>
                    <label for="email">email</label>
                    <input type="text" id="email">
                    <label for="phone-number">Phone Number</label>
                    <input type="text" id="phone-number">
                </div>

                <div>
                    <label for="password">Password</label>
                    <input type="text" id="password">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="text" id="confirm-password">
                </div>

                <button>Create Account</button>
                <p>Already have an account? Log in</p>
            </form>
        </div>
    </div>
</body>
</html>
